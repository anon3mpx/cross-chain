[profile.default]
src = "../src/contracts"
test = "../tests/contracts"
script = "../config/foundry/scripts"
out = "../build/foundry"
libs = ["../node_modules"]
cache_path = "../build/foundry-cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
allow_paths = [".."]
remappings = [
  "@openzeppelin/=../node_modules/@openzeppelin/",
  "src/=../src/"
]
